name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: |
        dotnet restore Chronicae.sln
        
    - name: Build
      run: |
        dotnet build Chronicae.sln --no-restore
        
    - name: Test
      run: |
        dotnet test Chronicae.Server.Windows.Tests/Chronicae.Server.Windows.Tests.csproj --no-build --verbosity normal